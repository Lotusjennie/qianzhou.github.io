# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.

# Basic Site Settings
locale                  : "en-US"
site_theme              : "default"
title                   : "Qian Zhou (周倩)"
title_separator         : "-"
name                    : &name "Qian Zhou"
description             : &description "Associate Professor & Institute Director at NJUPT. Expert in AI Security Governance, System Security (eBPF/ARM), and Privacy-Preserving Computing."
url                     : "https://您的GitHub用户名.github.io" # 请将此处替换为您真实的 GitHub 访问地址
baseurl                 : "" 
repository              : "您的GitHub用户名/您的GitHub用户名.github.io"

# Site Author
author:
  # Biographic information
  avatar           : "bio-photo.jpg" # 建议将简历照片重命名为此文件名并上传至 images/ 文件夹
  name             : "Qian Zhou (周倩)"
  pronouns         : "She/Her"
  bio              : "Associate Professor & Director of the Institute of System Security and Reliability Engineering at NJUPT."
  location         : "Nanjing, China"
  employer         : "Nanjing University of Posts and Telecommunications"
  uri              : 
  email            : "15077840606" # 这是您简历上的电话，如果需要展示 Email 请在此修改

  # Academic websites
  academia         : 
  arxiv            : 
  googlescholar    : "" # 建议在此处填入您的 Google Scholar 个人主页链接
  orcid            : ""
  researchgate     : 

  # Repositories and software development
  github           : "您的GitHub用户名"

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                  : 
breadcrumbs             : false
words_per_minute        : 160
future                  : true
read_more               : "disabled"
talkmap_link            : false
comments:
  provider              : false

# Analytics
analytics:
  provider              : "false"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json*
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
